4}],"total_goals":[{"goals":0,"p":0.03748},{"goals":1,"p":0.11922},{"goals":2,"p":0.2412},{"goals":3,"p":0.24597},{"goals":4,"p":0.18236},{"goals":5,"p":0.10274},{"goals":6,"p":0.0463},{"goals":7,"p":0.01728},{"goals":8,"p":0.00548}],"expected_total":3.04},"_decode_cfg":{"shot_boost":0.6,"goal_boost":0.0,"time_boost":0.0,"temperature":0.9,"top_p":0.95,"seed":7}},"model":{"cards":{"prediction":"# Model card \u2014 Prediction Engine\n\n**Task.** Fast match outcome/score distribution `f(team_i, team_j)` to drive the WC2026 Monte\nCarlo (win/advance/round probabilities).\n\n**Model.** Elo (sequential, from international results) + Dixon-Coles bivariate Poisson with\nadditive Elo-supremacy (floored for mismatches). Knockouts: extra-time draw -> dedicated\npenalty-shootout model. Optionally distilled from the Realism Engine (Phase 6).\n\n**Evaluation.** W/D/L Brier, log-loss (the primary \"ignorance score\"), and RPS (the ordered-outcome\nmetric) on a held-out international split (beats a fair base-rate prior) and a past-tournament\nbacktest (Euro 2024). Vectorized group sampling; exact WC2026 group tiebreakers; official fixed\nknockout bracket.\n\n**Field & ratings.** The group draw is the **real 2026 draw** (recovered from the scheduled\nfixtures, group letters pinned to the official draw) with a +120 Elo host bonus for\nCanada/Mexico/USA; ratings are **World-Football Elo from the full international-results history\n(1872-2026)**. `configs/wc2026.yaml` is only a fallback when the fixtures aren't present.\n\n**Knockout bracket.** The knockout draw uses the **official WC2026 fixed R32 slot map** (group\nposition -> predetermined slot), and the eight best third-placed teams are routed by **FIFA's\npublished Annex-C table** (the 495-combination map), not a strength re-seed \u2014 so the simulated\ncrossings match the real bracket and favourites are not kept artificially apart. (A legacy\nstrength-reseeded bracket is retained only as the `reseed` baseline used to measure draw-luck.)\n\n**What moves the odds (vs what's only shown).** The published title odds are driven by **Elo\nsupremacy + the Dixon-Coles goal model**, plus exactly two structural adjustments: the **+120 host\nbonus** and the **extra-time fatigue penalty**. The heat / travel / altitude / playing-style /\npedigree panels on the dashboard are **contextual displays** that characterise each fixture \u2014 they\nare *not* odds inputs. The raw style win-probability term measured \u0394Brier\u22480 on held-out data, so it\nis deliberately kept out of the Monte Carlo (C1).\n\n**Title-odds uncertainty.** `make odds-ci` bootstraps the DC goal-level fit and propagates it\nthrough the MC to report a 90% champion-probability band per team (B5); the dashboard shows the\nband on the favourite. The band reflects goal-level parameter uncertainty (Elo held fixed).\n\n**Limitations.** Corpus Elo mixes men's/women's; the supremacy prior is scale-matched. Goalscorer\nprojections lack official 2026 rosters (best-available shooting-share / international-goals basis).\nNot for betting.\n","realism":"# Model card \u2014 Realism Engine\n\n**Task.** Generate a soccer match event-by-event (events-as-language) into a believable box\nscore, conditioned on team strength + game state.\n\n**Architecture.** Decoder-only transformer (~4.1M params, d_model 256, 5 layers, 8 heads), event tokenizer (vocab 413: type\u00d7outcome, coarse/shot zones, time-delta bins, team + specials). Phase 5 adds a 360 auxiliary head (pressure / nearest-defender / teammates-ahead).\n\n**Data.** StatsBomb open data (international tournaments, full ~260-match corpus \u2248547k SPADL\nactions, 86% with 360), non-commercial with attribution. Leakage-aware split by competition/season.\n\n**Training.** Teacher-forced next-token + **scheduled sampling** (E3: a curriculum that feeds the\nmodel its own predictions late in training to cut exposure bias), M1 MPS, early stopping on val\nloss. Effect (measured): the model now generates **realistic-length matches** (it no longer emits\n`<END>` prematurely, so it needs far less decode-time `shot_boost` \u2014 0.6 vs the old 1.5) at\nslightly better held-out macro-F1; it is, however, *more conservative on goals*. Note: MPS kernels\nare non-deterministic, so metrics wobble a few percent run-to-run \u2014 treat small deltas as noise.\n\n**Metrics.** Per-event-type macro-F1 and calibration vs a Markov bigram baseline; distributional\nrealism (goals/shots/pass%/actions/duration) vs real with written tolerances (configs/eval.yaml).\n\n**Division of labour.** The Realism Engine owns the *believable single-match box score*, not the\nodds. Its conditioning is four team-strength scalars + game state (no learned team embeddings),\nso distillation can only recover a strength\u2192scoreline map that Elo + Dixon-Coles already encodes \u2014\nwhich is why the distilled Prediction Engine doesn't beat that baseline. Learned team embeddings\nare the route to making team *identity* shift the distribution (data permitting).\n\n**Limitations.** Small corpus -> under-generates goals at decode time (mitigated by a tuned\nshot-boost; see configs/sim.yaml); match duration is still under-generated. Player identity is not\ngenerated (scorers attributed via empirical shooter priors). Not for betting. Improve with more\ndata (uncap the corpus) and longer training (Colab/Kaggle T4).\n"},"realism_metrics":[{"metric":"goals_per_match","sim":3.5,"real":3.0,"real_sd":2.494,"tol":1.247,"ks":0.256,"ks_p":0.534,"pass":true},{"metric":"shots_per_match","sim":29.3,"real":26.219,"real_sd":8.774,"tol":4.387,"ks":0.331,"ks_p":0.237,"pass":true},{"metric":"pass_pct","sim":0.713,"real":0.746,"real_sd":0.044,"tol":0.022,"ks":0.391,"ks_p":0.107,"pass":false},{"metric":"actions_per_match","sim":1599.8,"real":1963.828,"real_sd":228.454,"tol":114.227,"ks":0.744,"ks_p":0.0,"pass":false},{"metric":"duration_min","sim":76.5,"real":104.574,"real_sd":10.393,"tol":5.197,"ks":1.0,"ks_p":0.0,"pass":false}],
